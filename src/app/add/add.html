<main>
  <div id="app">
    <h1>Lägg till arbetserfarenhet</h1>
    
    <form (ngSubmit)="addExperience()">
      
      <label for="companyname">Företagsnamn:</label><br>
      <input type="text" name="companyname" [(ngModel)]="newExperience.companyname" required><br><br>
  
      <label for="jobtitle">Jobbtitel:</label><br>
      <input type="text" name="jobtitle" [(ngModel)]="newExperience.jobtitle" required><br><br>
  
      <label for="location">Plats:</label><br>
      <input type="text" name="location" [(ngModel)]="newExperience.location" required><br><br>

      <label for="description">Beskrivning:</label><br>
      <textarea name="description" [(ngModel)]="newExperience.description" required></textarea><br><br>
  
      <button type="submit">Spara erfarenhet</button>
    </form>
  </div>
</main>
